name: iOS Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-15
    timeout-minutes: 45
    env:
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4'

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Show destinations
        run: xcodebuild -showdestinations -project Trailhound.xcodeproj -scheme Trailhound | grep -i "iphone" | head -20 || true

      - name: Boot simulator
        run: |
          chmod +x scripts/ci_pick_simulator.sh
          DESTINATION="$(./scripts/ci_pick_simulator.sh)"
          echo "DESTINATION=${DESTINATION}" >> "$GITHUB_ENV"
          SIM_ID="${DESTINATION#*id=}"
          echo "Booting simulator ${SIM_ID}"
          xcrun simctl boot "$SIM_ID" 2>/dev/null || true
          xcrun simctl bootstatus "$SIM_ID" -b

      - name: Run tests
        run: |
          chmod +x scripts/run_tests.sh
          echo "Using destination: ${DESTINATION}"
          ./scripts/run_tests.sh

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcresult
          path: build/TestResults.xcresult
          if-no-files-found: ignore
