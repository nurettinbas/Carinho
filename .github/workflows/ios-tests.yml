name: iOS Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-26
    timeout-minutes: 45
    env:
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.5'

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Show destinations
        run: xcodebuild -showdestinations -project Trailhound.xcodeproj -scheme Trailhound | grep -i "iphone" | head -20 || true

      - name: Pick simulator
        run: |
          chmod +x scripts/ci_pick_simulator.sh
          DESTINATION="$(./scripts/ci_pick_simulator.sh)"
          echo "Using destination: ${DESTINATION}"
          echo "DESTINATION=${DESTINATION}" >> "$GITHUB_ENV"

      - name: Run unit tests
        run: |
          chmod +x scripts/run_tests.sh
          INCLUDE_UI_TESTS=0 ./scripts/run_tests.sh

      - name: Run UI tests
        run: |
          chmod +x scripts/run_tests.sh
          ONLY_UI_TESTS=1 ./scripts/run_tests.sh

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcresult
          path: build/TestResults.xcresult
          if-no-files-found: ignore
